<!DOCTYPE html>
<html>
<head>
    <title>Varun's Interactive Site</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        canvas { border: 2px solid #3b82f6; background: #0f172a; border-radius: 12px; }
        /* This helper class hides elements */
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans flex items-center justify-center min-h-screen p-4">

    <div id="welcome-screen" class="text-center p-10 bg-slate-800 rounded-3xl shadow-2xl border border-slate-700 max-w-lg">
        <h1 class="text-5xl font-extrabold mb-4 bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
            Hello World!
        </h1>
        <p class="text-slate-400 text-lg mb-8">
            Welcome to my site. Click below to launch my point-manipulation program.
        </p>
        <button onclick="launchApp()" class="bg-blue-500 hover:bg-blue-600 px-8 py-4 rounded-full font-bold transition transform hover:scale-105">
            Launch Program
        </button>
    </div>

    <div id="app-screen" class="hidden text-center">
        <h2 class="text-3xl font-bold mb-6 text-blue-400">Interactive Point Box</h2>
        
        <canvas id="myCanvas" width="400" height="400"></canvas>

        <div class="mt-8 space-x-4">
            <button onclick="resetApp()" class="bg-slate-700 hover:bg-slate-600 px-6 py-2 rounded-full font-bold transition">
                Go Back
            </button>
        </div>
    </div>

    <script>
        // --- 1. UI NAVIGATION LOGIC ---
        function launchApp() {
            // Hide Welcome, Show App
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            animate(); // Initialize the animation
        }

        function resetApp() {
            // Hide App, Show Welcome
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('welcome-screen').classList.remove('hidden');
        }

        // --- 2. THE "PROGRAM" LOGIC ---
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');


        let mainPoints = [
            { x: 100, y: 100, vx: 2, vy: 1 }, 
            { x: 300, y: 100, vx: -1.5, vy: 2 },
            { x: 200, y: 300, vx: 1, vy: -2 }, 
            { x: 150, y: 200, vx: 2.5, vy: 1.5 }
        ];

        // Generate 10 constellation points for each main point
        let constellations = mainPoints.map((main, mainIndex) => {
            let subs = [];
            for (let i = 0; i < 10; i++) {
                subs.push({
                    // Distribute them initially at different starting offsets (x0, y0)
                    x0Offset: (Math.random() * 250 - 100),
                    y0Offset: (Math.random() * 250 - 100),
                    x: 0,
                    y: 0,
                    t: Math.random() * 10 // Stagger their starting time so they aren't perfectly stacked
                });
            }
            return subs;
        });


        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
    
            // Disable heavy shadows globally to keep performance smooth with 24 points
            ctx.shadowBlur = 0; 

            mainPoints.forEach((p, index) => {
                // A. Draw the 5 constellation points (Emerald Green)
                ctx.fillStyle = "#34d399";
                constellations[index].forEach(sub => {
                    ctx.beginPath();
                    ctx.arc(sub.x, sub.y, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                });

                // B. Draw the Main Point (Blue Glow)
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                ctx.fillStyle = "#60a5fa";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#3b82f6";
                ctx.fill();
                ctx.shadowBlur = 0; // Reset for next iterations
            });
        }


        function animate() {
            // 1. CLEAR THE CANVAS
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // --- FORCE CONSTANTS FOR MAIN BLUE POINTS ---
            const jitterPower = 0.1;
            const personalSpace = 35;
            const repelStrength = 0.05;
    
            // Tiny spiral forces so the main points don't collapse too aggressively
            const blueA = -0.0001; // Inward pull between blue nodes
            const blueB = 0.0002;  // Rotational twist between blue nodes

            // --- MATH STEP 1: Move the Main Blue Points ---
            mainPoints.forEach(p1 => {
                // A. Random baseline jitter
                p1.vx += (Math.random() * jitterPower - (jitterPower / 2));
                p1.vy += (Math.random() * jitterPower - (jitterPower / 2));

                // B. Interactions with all other blue points
                mainPoints.forEach(p2 => {
                    if (p1 === p2) return;

                    let dx = p1.x - p2.x;
                    let dy = p1.y - p2.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    // MUTUAL ATTRACTION: Force-based spiral pull toward other blue points
                    p1.vx += (blueA * dx - blueB * dy);
                    p1.vy += (blueB * dx + blueA * dy);

                    // REPULSION: Push back if they invade personal space
                    if (distance < personalSpace && distance > 0.1) {
                        let overlapRatio = (personalSpace - distance) / personalSpace;
                        p1.vx += (dx / distance) * overlapRatio * repelStrength;
                        p1.vy += (dy / distance) * overlapRatio * repelStrength;
                    }
                });

                // C. Apply speed limits so mutual attraction doesn't cause infinite acceleration
                p1.vx = Math.max(-2, Math.min(2, p1.vx));
                p1.vy = Math.max(-2, Math.min(2, p1.vy));

                // D. Move and Screen Wrap
                p1.x = (p1.x + p1.vx + 400) % 400;
                p1.y = (p1.y + p1.vy + 400) % 400;
            });

            // --- MATH STEP 2: Calculate Green Constellations (Analytical Formula) ---
            const a = -0.02;  // Tightness of green spiral inward decay
            const b = 0.05;   // Rotation speed of green points
            const dt = 0.1;   // Clock speed for constellation time tracking

            mainPoints.forEach((main, index) => {
                constellations[index].forEach(sub => {
                    sub.t += dt; // Tick time forward

                    // Targets are the freshly updated coordinates of the blue main points
                    let x0 = main.x + sub.x0Offset;
                    let y0 = main.y + sub.y0Offset;

                    let expFactor = Math.exp(a * sub.t);
                    let cosFactor = Math.cos(b * sub.t);
                    let sinFactor = Math.sin(b * sub.t);

                    let dx0 = x0 - main.x;
                    let dy0 = y0 - main.y;

                    // Your exact analytical spiral formula
                    sub.x = main.x + expFactor * (dx0 * cosFactor - dy0 * sinFactor);
                    sub.y = main.y + expFactor * (dx0 * sinFactor + dy0 * cosFactor);
            
                    // Keep green dots constrained to the canvas
                    sub.x = (sub.x + 400) % 400;
                    sub.y = (sub.y + 400) % 400;
                });
            });

            // 3. REDRAW & LOOP
            draw();
            requestAnimationFrame(animate);
        }
               
    </script>
</body>
</html>
